severity: error

manifest_checks:
  - name: check_model_names
    description: Models in the staging layer should always start with "stg__".
    include: ^models/staging
    model_name_pattern: ^stg__
  - name: check_model_names
    description: Models in the facts layer should always start with "fct__".
    include: ^models/facts
    model_name_pattern: ^fct__
  - name: check_model_names
    description: Models in the dimensions layer should always start with "dim__".
    include: ^models/dimensions
    model_name_pattern: ^dim__
  - name: check_model_names
    description: Models in the mart layer should always start with "mrt__".
    include: ^models/marts
    model_name_pattern: ^mrt__
