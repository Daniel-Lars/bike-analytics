name: 'dbt_project'
version: '1.0.0'

profile: 'dbt_project'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

models:
  dbt_project:
    # Config indicated by + and applies to all files under models/example/
    staging:
      +schema: staging
      +materialized: view
    dimensions:
      +schema: dimensions
      +materialized: table
    facts:
      +schema: facts
      +materialized: table
    marts:
      +schema: marts
      +materialized: table

vars:
  end_of_time: "CAST('9999-12-31' AS DATE)"
