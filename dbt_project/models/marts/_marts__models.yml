version: 2

models:
  - name: mrt__active_contracts
    description: >
      Counts the number of active contracts by year and month up to the current month. Contracts with contract_end_date = NULL are considered active.
      Granularity: Year, Month
    columns:
      - name: calendar_year
      - name: calendar_month
      - name: active_contracts
  - name: mrt__avg_monthly_km_by_bike
    description: >
      Calculation of the average usage by bike per month.
      Granularity: Bike
    columns:
      - name: bike_id
      - name: avg_km_by_month
